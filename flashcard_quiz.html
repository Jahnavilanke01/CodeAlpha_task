<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Quiz App</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        width:500px;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    .card{
        background:#fafafa;
        border:1px solid #ddd;
        border-radius:8px;
        padding:25px;
        min-height:150px;
        text-align:center;
        margin-bottom:20px;
    }

    .question{
        font-size:22px;
        font-weight:bold;
    }

    .answer{
        margin-top:15px;
        font-size:18px;
        color:green;
        display:none;
    }

    button{
        padding:10px 15px;
        margin:5px;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

    .show-btn{
        background:#007bff;
        color:white;
    }

    .nav-btn{
        background:#28a745;
        color:white;
    }

    .delete-btn{
        background:#dc3545;
        color:white;
    }

    .edit-btn{
        background:#ffc107;
    }

    .form{
        margin-top:20px;
    }

    input{
        width:100%;
        padding:10px;
        margin:5px 0;
        border:1px solid #ccc;
        border-radius:5px;
    }

    .add-btn{
        width:100%;
        background:#007bff;
        color:white;
        margin-top:10px;
    }

    .controls{
        text-align:center;
    }
</style>
</head>
<body>

<div class="container">

    <h1>Flashcard Quiz App</h1>

    <div class="card">
        <div class="question" id="question"></div>
        <div class="answer" id="answer"></div>
    </div>

    <div class="controls">
        <button class="show-btn" onclick="showAnswer()">Show Answer</button>
        <button class="nav-btn" onclick="prevCard()">Previous</button>
        <button class="nav-btn" onclick="nextCard()">Next</button>
        <button class="edit-btn" onclick="editCard()">Edit</button>
        <button class="delete-btn" onclick="deleteCard()">Delete</button>
    </div>

    <div class="form">
        <h3>Add New Flashcard</h3>

        <input type="text" id="newQuestion" placeholder="Enter Question">

        <input type="text" id="newAnswer" placeholder="Enter Answer">

        <button class="add-btn" onclick="addCard()">
            Add Flashcard
        </button>
    </div>

</div>

<script>

let flashcards = [
    {
        question:"What is HTML?",
        answer:"HTML stands for HyperText Markup Language."
    },
    {
        question:"What is CSS?",
        answer:"CSS is used to style web pages."
    },
    {
        question:"What is JavaScript?",
        answer:"JavaScript adds interactivity to websites."
    }
];

let currentIndex = 0;

function displayCard(){
    document.getElementById("question").innerText =
        flashcards[currentIndex].question;

    document.getElementById("answer").innerText =
        flashcards[currentIndex].answer;

    document.getElementById("answer").style.display = "none";
}

function showAnswer(){
    document.getElementById("answer").style.display = "block";
}

function nextCard(){
    if(currentIndex < flashcards.length - 1){
        currentIndex++;
    } else {
        currentIndex = 0;
    }

    displayCard();
}

function prevCard(){
    if(currentIndex > 0){
        currentIndex--;
    } else {
        currentIndex = flashcards.length - 1;
    }

    displayCard();
}

function addCard(){

    let question =
        document.getElementById("newQuestion").value;

    let answer =
        document.getElementById("newAnswer").value;

    if(question === "" || answer === ""){
        alert("Please enter both question and answer");
        return;
    }

    flashcards.push({
        question:question,
        answer:answer
    });

    document.getElementById("newQuestion").value = "";
    document.getElementById("newAnswer").value = "";

    alert("Flashcard Added!");
}

function editCard(){

    let newQuestion = prompt(
        "Edit Question:",
        flashcards[currentIndex].question
    );

    let newAnswer = prompt(
        "Edit Answer:",
        flashcards[currentIndex].answer
    );

    if(newQuestion && newAnswer){

        flashcards[currentIndex].question =
            newQuestion;

        flashcards[currentIndex].answer =
            newAnswer;

        displayCard();
    }
}

function deleteCard(){

    if(flashcards.length === 1){
        alert("At least one flashcard required.");
        return;
    }

    flashcards.splice(currentIndex,1);

    if(currentIndex >= flashcards.length){
        currentIndex = flashcards.length - 1;
    }

    displayCard();
}

displayCard();

</script>

</body>
</html>
